<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 260" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="shadow-light" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <path d="M 120 70 
           C 90 20 20 40 20 100 
           C 20 160 90 205 120 220 Z" 
        fill="#C62828" filter="url(#shadow-light)"/>

  <path d="M 130 80 
           A 40 40 0 0 1 170 40 
           L 210 40 
           L 250 80 
           L 250 220 
           L 130 220 Z" 
        fill="#FFFFFF" stroke="#000000" stroke-width="12" stroke-linejoin="round" filter="url(#shadow)"/>

  <path d="M 210 40 L 210 80 L 250 80" 
        fill="none" stroke="#000000" stroke-width="12" stroke-linejoin="round" stroke-linecap="round"/>

  <g stroke="#000000" stroke-width="10" stroke-linecap="round">
    <line x1="155" y1="105" x2="225" y2="105" />
    <line x1="155" y1="130" x2="225" y2="130" />
    <line x1="155" y1="155" x2="225" y2="155" />
    <line x1="155" y1="180" x2="185" y2="180" />
    <line x1="155" y1="205" x2="185" y2="205" />
  </g>

  <path d="M 195 170 L 215 190 L 265 130" 
        fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 195 170 L 215 190 L 265 130" 
        fill="none" stroke="#3CA56A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow-light)"/>
</svg>
